name: Vitrine — scrape & publish

on:
  schedule:
    - cron: "0 1,9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - name: Scrape
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SYNC_URL: https://vitrine-sync.thamibenghazi.workers.dev
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: python scrape.py
      - name: Commit data
        run: |
          git config user.name "vitrine-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/jobs.json data/history.json data/market.json data/national.json
          git commit -m "refresh jobs [skip ci]" || echo "no changes"
          git push
